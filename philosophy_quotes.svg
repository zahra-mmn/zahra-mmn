<svg viewBox="0 0 1120 300" xmlns="http://www.w3.org/2000/svg" font-family="'Fira Code','JetBrains Mono',monospace">
  <defs>
    <radialGradient id="ph-glow" cx="0.5" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#3CE89A" stop-opacity="0.10"/>
      <stop offset="0.55" stop-color="#8B8FF7" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ph-edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3CE89A" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8B8FF7" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <rect width="1120" height="300" fill="#0B0F14"/>
  <rect x="10" y="10" width="1100" height="280" rx="16" fill="#0D1117"/>
  <rect x="10" y="10" width="1100" height="280" rx="16" fill="url(#ph-glow)"/>
  <rect x="10.5" y="10.5" width="1099" height="279" rx="15.5" fill="none" stroke="url(#ph-edge)" stroke-width="1.3"/>

  <!-- decorative mark -->
  <text x="66" y="90" font-family="Georgia, serif" font-size="86" fill="#22493A" opacity="0.55">&#8220;</text>

  <!-- rotating quotes -->
  <g>
    
    <text font-family="Georgia, 'Times New Roman', serif" font-style="italic"
          font-size="21" fill="#E9F1EC" text-anchor="middle" opacity="0">
      <tspan x="560.0" y="98.0">“Intelligence is not about having all the answers —</tspan><tspan x="560.0" y="128.0">it's about asking the right questions and</tspan><tspan x="560.0" y="158.0">knowing where to look for the truth.”</tspan>
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.0300;0.1700;0.2000;1" dur="25s" begin="0s" repeatCount="indefinite"/>
    </text>

    <text font-family="Georgia, 'Times New Roman', serif" font-style="italic"
          font-size="21" fill="#E9F1EC" text-anchor="middle" opacity="0">
      <tspan x="560.0" y="128.0">“Data without context is just noise.”</tspan>
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.0300;0.1700;0.2000;1" dur="25s" begin="5s" repeatCount="indefinite"/>
    </text>

    <text font-family="Georgia, 'Times New Roman', serif" font-style="italic"
          font-size="21" fill="#E9F1EC" text-anchor="middle" opacity="0">
      <tspan x="560.0" y="128.0">“The best model is the one that earns trust.”</tspan>
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.0300;0.1700;0.2000;1" dur="25s" begin="10s" repeatCount="indefinite"/>
    </text>

    <text font-family="Georgia, 'Times New Roman', serif" font-style="italic"
          font-size="21" fill="#E9F1EC" text-anchor="middle" opacity="0">
      <tspan x="560.0" y="128.0">“Build for impact, not for benchmarks.”</tspan>
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.0300;0.1700;0.2000;1" dur="25s" begin="15s" repeatCount="indefinite"/>
    </text>

    <text font-family="Georgia, 'Times New Roman', serif" font-style="italic"
          font-size="21" fill="#E9F1EC" text-anchor="middle" opacity="0">
      <tspan x="560.0" y="98.0">“AI is a bridge between human intuition and machine precision.</tspan><tspan x="560.0" y="128.0">I build that bridge — one model, one pipeline,</tspan><tspan x="560.0" y="158.0">one insight at a time.”</tspan>
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.0300;0.1700;0.2000;1" dur="25s" begin="20s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- progress dots -->
  <g>
    <circle cx="516.0" cy="246" r="3" fill="#2A3A32"/>
    
    <circle cx="516.0" cy="246" r="3.6" fill="#3CE89A" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.0300;0.1700;0.2000;1"
        dur="25s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="538.0" cy="246" r="3" fill="#2A3A32"/>
    
    <circle cx="538.0" cy="246" r="3.6" fill="#3CE89A" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.0300;0.1700;0.2000;1"
        dur="25s" begin="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="560.0" cy="246" r="3" fill="#2A3A32"/>
    
    <circle cx="560.0" cy="246" r="3.6" fill="#3CE89A" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.0300;0.1700;0.2000;1"
        dur="25s" begin="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="582.0" cy="246" r="3" fill="#2A3A32"/>
    
    <circle cx="582.0" cy="246" r="3.6" fill="#3CE89A" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.0300;0.1700;0.2000;1"
        dur="25s" begin="15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="604.0" cy="246" r="3" fill="#2A3A32"/>
    
    <circle cx="604.0" cy="246" r="3.6" fill="#3CE89A" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.0300;0.1700;0.2000;1"
        dur="25s" begin="20s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- divider + attribution -->
  <line x1="534.0" y1="196" x2="586.0" y2="196" stroke="#3CE89A" stroke-width="1.5" opacity="0.7"/>
  <text x="560.0" y="221" fill="#E9F1EC" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="0.5">— Fatima Zahra Moumene</text>
</svg>
